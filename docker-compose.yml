name: portfolio-kanban

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-kanban:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/data/kanban.sqlite
      ADMIN_ACCESS_KEY: ${ADMIN_ACCESS_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      AGENT_API_KEY: ${AGENT_API_KEY}
    volumes:
      - kanban_data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/board > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  kanban_data:
    driver: local
